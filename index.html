<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Almedalsveckan 2026 — Evenemangskarta</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    header {
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: #e94560;
      letter-spacing: 0.05em;
    }
    header .meta {
      font-size: 0.78rem;
      color: #8a8a9a;
    }
    header .count {
      margin-left: auto;
      font-size: 0.85rem;
      color: #a0c4ff;
      font-weight: 600;
    }

    #controls {
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      padding: 8px 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
      flex-shrink: 0;
    }
    #controls label {
      font-size: 0.78rem;
      color: #8a8a9a;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #controls select, #controls input[type="text"] {
      background: #0f3460;
      border: 1px solid #e94560;
      color: #e0e0e0;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 0.82rem;
    }
    #controls input[type="text"] { width: 200px; }

    #map { flex: 1; }

    .leaflet-popup-content-wrapper {
      background: #16213e;
      color: #e0e0e0;
      border: 1px solid #e94560;
      border-radius: 6px;
      box-shadow: 0 4px 20px rgba(233,69,96,0.3);
    }
    .leaflet-popup-tip { background: #16213e; }
    .popup-title {
      font-weight: 700;
      font-size: 0.9rem;
      color: #e94560;
      margin-bottom: 6px;
      line-height: 1.3;
    }
    .popup-meta {
      font-size: 0.78rem;
      color: #a0c4ff;
      margin-bottom: 4px;
    }
    .popup-tags {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin: 6px 0;
    }
    .tag {
      background: #0f3460;
      color: #e0e0e0;
      border-radius: 3px;
      padding: 2px 6px;
      font-size: 0.72rem;
    }
    .popup-link {
      display: inline-block;
      margin-top: 6px;
      color: #e94560;
      font-size: 0.78rem;
      text-decoration: none;
    }
    .popup-link:hover { text-decoration: underline; }
    .popup-desc {
      font-size: 0.78rem;
      color: #c0c0c8;
      margin-top: 6px;
      line-height: 1.4;
      max-height: 80px;
      overflow: hidden;
    }

    #stats-bar {
      background: #0f3460;
      padding: 4px 16px;
      font-size: 0.75rem;
      color: #8a8a9a;
      display: flex;
      gap: 20px;
      flex-shrink: 0;
    }
    #stats-bar span { color: #a0c4ff; }

    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #16213e;
      border: 2px solid #e94560;
      border-radius: 8px;
      padding: 20px 40px;
      font-size: 1rem;
      color: #e94560;
      z-index: 9999;
    }
  </style>
</head>
<body>

<header>
  <h1>🏛 Almedalsveckan 2026</h1>
  <div class="meta">22–26 juni · Visby, Gotland</div>
  <div class="count" id="event-count">Laddar...</div>
</header>

<div id="controls">
  <label>
    Datum
    <select id="filter-date">
      <option value="">Alla dagar</option>
      <option value="2026-06-22">Måndag 22/6</option>
      <option value="2026-06-23">Tisdag 23/6</option>
      <option value="2026-06-24">Onsdag 24/6</option>
      <option value="2026-06-25">Torsdag 25/6</option>
      <option value="2026-06-26">Fredag 26/6</option>
    </select>
  </label>

  <label>
    Ämne
    <select id="filter-subject">
      <option value="">Alla ämnen</option>
    </select>
  </label>

  <label>
    Typ
    <select id="filter-type">
      <option value="">Alla typer</option>
    </select>
  </label>

  <label>
    Sök
    <input type="text" id="filter-search" placeholder="Titel eller arrangör...">
  </label>
</div>

<div id="map">
  <div class="loading" id="loading">Laddar evenemang...</div>
</div>

<div id="stats-bar">
  Visar <span id="stat-showing">0</span> evenemang ·
  Geocodade <span id="stat-geocoded">0</span> ·
  Källa: almedalsveckan.info
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
<script>
  // ---------------------------------------------------------------------------
  // Karta
  // ---------------------------------------------------------------------------
  const map = L.map('map', {
    center: [57.6368, 18.2955],
    zoom: 15,
    preferCanvas: true,
  });

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://carto.com/">CartoDB</a> &copy; <a href="https://openstreetmap.org/">OSM</a>',
    maxZoom: 19,
  }).addTo(map);

  const clusterGroup = L.markerClusterGroup({
    maxClusterRadius: 40,
    showCoverageOnHover: false,
  });
  map.addLayer(clusterGroup);

  // ---------------------------------------------------------------------------
  // Data
  // ---------------------------------------------------------------------------
  let allEvents = [];
  let markers = [];

  function makeIcon(subject) {
    const colorMap = {
      'Säkerhet': '#e94560',
      'Säkerhet/försvar': '#e94560',
      'Hälsa': '#4ecdc4',
      'Hållbarhet': '#95e04b',
      'Demokrati': '#f7b731',
      'Ekonomi': '#a29bfe',
      'Integration': '#fd9644',
      'Utbildning': '#45aaf2',
    };
    let color = '#a0c4ff';
    for (const [key, val] of Object.entries(colorMap)) {
      if (subject && subject.toLowerCase().includes(key.toLowerCase())) {
        color = val;
        break;
      }
    }
    return L.divIcon({
      className: '',
      html: `<div style="
        width:10px;height:10px;border-radius:50%;
        background:${color};
        border:2px solid rgba(255,255,255,0.6);
        box-shadow:0 0 6px ${color};
      "></div>`,
      iconSize: [10, 10],
      iconAnchor: [5, 5],
    });
  }

  function buildPopup(ev) {
    const time = ev.starttid && ev.sluttid
      ? `${ev.datum} · ${ev.starttid}–${ev.sluttid}`
      : (ev.datum || '');
    const desc = (ev.beskrivning_samhalle || ev.beskrivning || '').slice(0, 200);
    const tags = [ev.amne, ev.sekundart_amne, ev.evenemangstyp]
      .filter(Boolean)
      .map(t => `<span class="tag">${t}</span>`)
      .join('');
    return `
      <div class="popup-title">${ev.titel || '(utan titel)'}</div>
      <div class="popup-meta">📅 ${time}</div>
      <div class="popup-meta">📍 ${ev.plats || 'Plats ej angiven'}</div>
      <div class="popup-meta">🏛 ${ev.arrangorer || ''}</div>
      <div class="popup-tags">${tags}</div>
      ${desc ? `<div class="popup-desc">${desc}${desc.length === 200 ? '…' : ''}</div>` : ''}
      ${ev.url ? `<a class="popup-link" href="${ev.url}" target="_blank">↗ Öppna på almedalsveckan.info</a>` : ''}
    `;
  }

  function renderMarkers(events) {
    clusterGroup.clearLayers();
    markers = [];
    let geocoded = 0;

    for (const ev of events) {
      const lat = parseFloat(ev.lat);
      const lon = parseFloat(ev.lon);
      if (!lat || !lon) continue;

      geocoded++;
      const marker = L.marker([lat, lon], { icon: makeIcon(ev.amne) });
      marker.bindPopup(buildPopup(ev), { maxWidth: 320 });
      markers.push(marker);
    }

    clusterGroup.addLayers(markers);
    document.getElementById('stat-showing').textContent = events.length;
    document.getElementById('stat-geocoded').textContent = geocoded;
    document.getElementById('event-count').textContent = `${events.length} evenemang`;
  }

  // ---------------------------------------------------------------------------
  // Filter
  // ---------------------------------------------------------------------------
  function applyFilters() {
    const date = document.getElementById('filter-date').value;
    const subject = document.getElementById('filter-subject').value;
    const type = document.getElementById('filter-type').value;
    const search = document.getElementById('filter-search').value.toLowerCase();

    const filtered = allEvents.filter(ev => {
      if (date && ev.datum !== date) return false;
      if (subject && !(ev.amne || '').includes(subject)) return false;
      if (type && ev.evenemangstyp !== type) return false;
      if (search) {
        const haystack = `${ev.titel} ${ev.arrangorer} ${ev.plats}`.toLowerCase();
        if (!haystack.includes(search)) return false;
      }
      return true;
    });

    renderMarkers(filtered);
  }

  ['filter-date', 'filter-subject', 'filter-type'].forEach(id => {
    document.getElementById(id).addEventListener('change', applyFilters);
  });
  document.getElementById('filter-search').addEventListener('input', applyFilters);

  function populateFilters(events) {
    const subjects = [...new Set(events.map(e => e.amne).filter(Boolean))].sort();
    const types = [...new Set(events.map(e => e.evenemangstyp).filter(Boolean))].sort();

    const subjectSel = document.getElementById('filter-subject');
    subjects.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s;
      opt.textContent = s;
      subjectSel.appendChild(opt);
    });

    const typeSel = document.getElementById('filter-type');
    types.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t;
      opt.textContent = t;
      typeSel.appendChild(opt);
    });
  }

  // ---------------------------------------------------------------------------
  // Ladda data
  // ---------------------------------------------------------------------------
  fetch('data/almedalen_events_2026.geojson')
    .then(r => {
      if (!r.ok) throw new Error('GeoJSON saknas – kör scrape_almedalen.py --geocode');
      return r.json();
    })
    .then(geojson => {
      allEvents = geojson.features.map(f => ({
        ...f.properties,
        lat: f.geometry.coordinates[1],
        lon: f.geometry.coordinates[0],
      }));
      document.getElementById('loading').remove();
      populateFilters(allEvents);
      renderMarkers(allEvents);
    })
    .catch(err => {
      document.getElementById('loading').innerHTML =
        `<strong>Datakälla saknas</strong><br><small>${err.message}</small>`;
      console.error(err);
    });
</script>
</body>
</html>
