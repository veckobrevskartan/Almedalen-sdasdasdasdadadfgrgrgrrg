    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {

      background: #111827;
      color: #e5e7eb;
      height: 100svh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      overflow: hidden;
    }

    header {
      background: #0f172a;
      border-bottom: 1px solid #334155;
      padding: 10px 14px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 4px 12px;
      align-items: center;
      z-index: 1200;
    }
    h1 {
      font-size: clamp(1rem, 3.8vw, 1.18rem);
      color: #f43f5e;
      letter-spacing: .02em;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .meta {
      color: #94a3b8;
      font-size: .82rem;
      grid-column: 1 / 2;
    }
    .count {
      grid-column: 2 / 3;
      grid-row: 1 / 3;
      color: #93c5fd;
      font-weight: 700;
      font-size: .86rem;
      text-align: right;
      white-space: nowrap;
    }

    #map {
      position: relative;
      min-height: 0;
      width: 100%;
    }

    .floating-toggle {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 1100;
      background: rgba(15,23,42,.96);
      color: #f8fafc;
      border: 1px solid #f43f5e;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: .9rem;
      font-weight: 700;
      box-shadow: 0 6px 22px rgba(0,0,0,.35);
      cursor: pointer;
    }
    .floating-toggle:hover { background: #1e293b; }

    .filter-panel {
      position: absolute;
      top: 54px;
      right: 12px;
      z-index: 1100;
      width: min(390px, calc(100vw - 24px));
      max-height: min(72svh, 680px);
      overflow: auto;
      background: rgba(15,23,42,.97);
      border: 1px solid #334155;
      border-radius: 14px;
      box-shadow: 0 12px 34px rgba(0,0,0,.45);
      padding: 12px;
    }
    .filter-panel.collapsed { display: none; }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .panel-title { color: #f8fafc; font-size: .98rem; font-weight: 800; }
    .panel-close {
      background: #1e293b;
      color: #f8fafc;
      border: 1px solid #f43f5e;
      border-radius: 999px;
      width: 34px;
      height: 34px;
      line-height: 1;
      font-size: 1.15rem;
      font-weight: 800;
      cursor: pointer;
    }
    .filter-group {
      border-top: 1px solid #334155;
      padding-top: 10px;
      margin-top: 10px;
    }
    .filter-title {
      color: #93c5fd;
      font-size: .82rem;
      font-weight: 800;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
    }
    .quick-actions { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
    .mini-btn {
      background: #1e293b;
      color: #e5e7eb;
      border: 1px solid #475569;
      border-radius: 999px;
      padding: 5px 8px;
      font-size: .76rem;
      cursor: pointer;
    }
    .mini-btn:hover { border-color: #f43f5e; }
    .search-input {
      width: 100%;
      background: #1e293b;
      color: #e5e7eb;
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 10px 10px;
      font-size: .92rem;
    }
    .check-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
    }
    #date-options.check-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .check-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: #dbeafe;
      font-size: .84rem;
      line-height: 1.25;
      background: rgba(30,41,59,.78);
      border: 1px solid rgba(71,85,105,.75);
      border-radius: 8px;
      padding: 8px;
      cursor: pointer;
      user-select: none;
    }
    .check-row input {
      margin-top: 1px;
      width: 16px;
      height: 16px;
      accent-color: #f43f5e;
      flex: 0 0 auto;
    }
    .check-row span {
      overflow-wrap: anywhere;
    }
    #subject-options {
      max-height: 260px;
      overflow: auto;
      padding-right: 2px;
    }
    .map-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .action-btn {
      background: #1e293b;
      color: #e5e7eb;
      border: 1px solid #475569;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: .82rem;
      cursor: pointer;
    }
    .action-btn:hover { border-color: #f43f5e; }
    .action-btn:disabled { opacity: .5; cursor: not-allowed; }
    .legend-line { color: #cbd5e1; font-size: .78rem; line-height: 1.55; }
    .dot { display:inline-block; width:10px; height:10px; border-radius:50%; margin-right:5px; vertical-align:-1px; }

    #status-panel {
      position: absolute;
      z-index: 1000;
      right: 12px;
      bottom: 14px;
      width: min(380px, calc(100vw - 24px));
      background: rgba(15, 23, 42, .93);
      border: 1px solid #334155;
      box-shadow: 0 8px 24px rgba(0,0,0,.32);
      border-radius: 12px;
      padding: 9px 11px;
      font-size: .78rem;
      line-height: 1.35;
      pointer-events: none;
    }
    #status-panel .title { display: none; }
    #status-panel .small { color: #cbd5e1; }
    #progressbar { height: 5px; background: #1e293b; border-radius: 99px; margin-top: 6px; overflow: hidden; }
    #progressbar > div { height: 100%; width: 0%; background: #f43f5e; transition: width .2s ease; }

    #stats-bar {
      background: #0f172a;
      border-top: 1px solid #334155;
      color: #94a3b8;
      padding: 7px 12px calc(7px + env(safe-area-inset-bottom));
      font-size: .74rem;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      z-index: 1200;
    }
    #stats-bar span { color: #93c5fd; font-weight: 700; }

    .leaflet-popup-content-wrapper {
      background: #0f172a;
      color: #e5e7eb;
      border: 1px solid #f43f5e;
      border-radius: 8px;
      box-shadow: 0 8px 30px rgba(0,0,0,.4);

    .event-list { max-height: min(340px, 60svh); overflow-y: auto; padding-right: 4px; }
    .event-item { border-top: 1px solid #334155; padding: 7px 0; }
    .event-title { color: #f8fafc; font-weight: 700; font-size: .84rem; line-height: 1.25; }
    .event-meta { color: #cbd5e1; font-size: .75rem; margin-top: 2px; }
    .tag { display: inline-block; margin-top: 4px; background: #1e293b; color: #e5e7eb; border-radius: 3px; padding: 2px 5px; font-size: .7rem; }
    a { color: #fb7185; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .source-official { color: #22c55e; }
    .source-address { color: #93c5fd; }
    .source-manual { color: #fbbf24; }
    .source-missing { color: #fb7185; }

    @media (max-width: 640px) {
      header {
        padding: 8px 10px;
        grid-template-columns: 1fr;
        gap: 2px;
      }
      .count {
        grid-column: 1;
        grid-row: auto;
        text-align: left;
        font-size: .78rem;
      }
      .meta { font-size: .78rem; }
      .floating-toggle {
        top: 10px;
        right: 10px;
        padding: 8px 11px;
        font-size: .86rem;
      }
      .filter-panel {

        left: 10px;
        right: 10px;
        width: auto;
        max-height: 74svh;
      }
      #date-options.check-grid { grid-template-columns: 1fr; }
      #stats-bar { gap: 8px 12px; font-size: .7rem; }
      #status-panel {
        left: 10px;
        right: 10px;
        bottom: 10px;
        width: auto;
      }
      .leaflet-popup-content { width: min(82vw, 360px) !important; }
    }
  </style>
</head>

function esc(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function sleep(ms) { return new Promise(resolve => setTimeout(resolve, ms)); }

function inVisby(lat, lon) {
  return Number.isFinite(lat) && Number.isFinite(lon) &&
    lat >= VISBY_BOUNDS.minLat && lat <= VISBY_BOUNDS.maxLat &&
    lon >= VISBY_BOUNDS.minLon && lon <= VISBY_BOUNDS.maxLon;
}

function setStatus(text, pct = null) {
  document.getElementById('status-text').textContent = text;
  if (pct !== null) document.querySelector('#progressbar > div').style.width = `${Math.max(0, Math.min(100, pct))}%`;
}

function hideStatus(delay = 700) {
  setTimeout(() => {
    const p = document.getElementById('status-panel');
    if (p) p.style.display = 'none';
  }, delay);
}

function loadCache() {
  try { return JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); }
  catch { return {}; }
}
function saveCache(cache) {
  localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
}

function cleanPlace(place) {
  return String(place || '')
    .replace(/\s+/g, ' ')
    .replace(/Visa alla.*$/i, '')
    .trim();
}

function placeKey(place) {
  return cleanPlace(place).toLowerCase();
}

function extractMarkplatsNumber(place) {
  const p = cleanPlace(place);
  let m = p.match(/\bplats\s*(\d{1,4})\b/i);
  if (m) return m[1];
  // Exempel: "100, Hamnterminalen, Bussen"
  m = p.match(/^\s*(\d{2,4})\s*,/);
  if (m) return m[1];
  return null;
}

  const p = cleanPlace(place);
  return /\b\d+[a-zåäö]?\b/i.test(p) &&
    /(gatan|gränd|vägen|plan|plats|bron|terrassen|hamn|kaserngatan|mellangatan|strandgatan|donnersgatan|adelsgatan|hästgatan|s:t|s:ta|slottsterrassen|björngränd|volters)/i.test(p);
}

function geocodeQuery(place) {
  let p = cleanPlace(place);
  // Ta bort markplatsnummer och arenanamn, men behåll gatuadress om sådan finns.
  p = p.replace(/,?\s*plats\s*\d{1,4}\b/ig, '');
  p = p.replace(/,?\s*seminarielokal:\s*[^,]+/ig, '');
  p = p.replace(/,?\s*sal\s+[A-ZÅÄÖ0-9]+/ig, '');
  p = p.replace(/"/g, '');
  p = p.replace(/\s+/g, ' ').trim();
  return `${p}, Visby, Gotland, Sverige`;
}

function centroidFromGeoJSONGeometry(geometry) {
  if (!geometry) return null;
  if (geometry.type === 'Point') return { lon: geometry.coordinates[0], lat: geometry.coordinates[1] };
  let coords = [];
  if (geometry.type === 'Polygon') coords = geometry.coordinates.flat(1);
  if (geometry.type === 'MultiPolygon') coords = geometry.coordinates.flat(2);
  if (geometry.type === 'LineString') coords = geometry.coordinates;
  if (geometry.type === 'MultiLineString') coords = geometry.coordinates.flat(1);
  if (!coords.length) return null;
  let lon = 0, lat = 0, n = 0;
  for (const c of coords) {
    if (Array.isArray(c) && Number.isFinite(c[0]) && Number.isFinite(c[1])) {
      lon += c[0]; lat += c[1]; n++;
    }
  }
  if (!n) return null;
  return { lon: lon / n, lat: lat / n };
}

function collectStrings(obj, predicate, out = []) {
  if (!obj) return out;
  if (typeof obj === 'string') {
    if (predicate(obj)) out.push(obj);
  } else if (Array.isArray(obj)) {
    for (const v of obj) collectStrings(v, predicate, out);
  } else if (typeof obj === 'object') {
    for (const v of Object.values(obj)) collectStrings(v, predicate, out);
  }
  return out;
}

async function fetchJson(url, params = {}) {
  const u = new URL(url);
  for (const [k, v] of Object.entries(params)) u.searchParams.set(k, v);
  const r = await fetch(u.toString());
  if (!r.ok) throw new Error(`${r.status} ${r.statusText}: ${u}`);
  return r.json();
}

// ---------------------------------------------------------------------------
// Officiell markkarta: upptäck webbkarta och FeatureServer-lager
// ---------------------------------------------------------------------------
async function getPortalItem(id) {
  return fetchJson(`${PORTAL}/sharing/rest/content/items/${id}`, { f: 'json' });
}
async function getPortalItemData(id) {
  return fetchJson(`${PORTAL}/sharing/rest/content/items/${id}/data`, { f: 'json' });
}

async function discoverWebMapIds() {
  const appData = await getPortalItemData(MARKKARTA_APP_ID);
  const ids = new Set();

  function walk(obj, key = '') {
    if (!obj) return;
    if (typeof obj === 'string') {
      if (/^[0-9a-f]{32}$/i.test(obj) && /webmap|map|itemid|itemId/i.test(key)) ids.add(obj);
      return;
    }
    if (Array.isArray(obj)) return obj.forEach(v => walk(v, key));
    if (typeof obj === 'object') {
      for (const [k, v] of Object.entries(obj)) walk(v, k);
    }
  }
  walk(appData);

  const confirmed = [];
  for (const id of ids) {
    try {
      const item = await getPortalItem(id);
      if ((item.type || '').toLowerCase().includes('web map')) confirmed.push(id);
    } catch (_) {}
  }
  return confirmed;
}

async function discoverLayerUrls() {
  const urls = new Set();
  const webmapIds = await discoverWebMapIds();

  for (const id of webmapIds) {
    const data = await getPortalItemData(id);
    collectStrings(data, s => /\/(FeatureServer|MapServer)(\/\d+)?$/i.test(s), []).forEach(u => urls.add(u));
  }

  // Reserv: leta även direkt i appens konfiguration.
  try {
    const appData = await getPortalItemData(MARKKARTA_APP_ID);
    collectStrings(appData, s => /\/(FeatureServer|MapServer)(\/\d+)?$/i.test(s), []).forEach(u => urls.add(u));
  } catch (_) {}

  return [...urls];
}

async function expandLayerUrls(urls) {
  const out = new Set();
  for (const url of urls) {
    if (/\/(FeatureServer|MapServer)\/\d+$/i.test(url)) {
      out.add(url);
      continue;
    }
    if (/\/(FeatureServer|MapServer)$/i.test(url)) {
      try {
        const service = await fetchJson(url, { f: 'json' });
        for (const layer of service.layers || []) out.add(`${url}/${layer.id}`);
      } catch (_) {}
    }
  }
  return [...out];
}

async function queryLayerGeoJSON(layerUrl) {
  const features = [];
  let offset = 0;
  const pageSize = 2000;
  while (true) {
    const data = await fetchJson(`${layerUrl}/query`, {
      f: 'geojson',
      where: '1=1',
      outFields: '*',
      returnGeometry: 'true',
      outSR: '4326',
      resultOffset: String(offset),
      resultRecordCount: String(pageSize),
    });
    const batch = data.features || [];
    features.push(...batch);
    if (batch.length < pageSize) break;
    offset += pageSize;
  }
  return features;
}

function indexOfficialMarkplatsFeatures(features) {
  const index = new Map();
  for (const f of features) {
    const props = f.properties || {};
    const c = centroidFromGeoJSONGeometry(f.geometry);
    if (!c || !inVisby(c.lat, c.lon)) continue;

    const values = Object.entries(props)
      .filter(([k, v]) => /plats|mark|nr|nummer|id|namn|name/i.test(k) || /\b\d{2,4}\b/.test(String(v ?? '')))
      .map(([k, v]) => `${k}:${v}`);

    for (const value of values) {
      const matches = String(value).matchAll(/\b(\d{2,4})\b/g);
      for (const m of matches) {
        const nr = m[1];
        // Almedalens markplatsnummer ligger i praktiken i detta spann. Undviker slumpmässiga årtal och objekt-id.
        const n = Number(nr);
        if (n >= 1 && n <= 999) {
          if (!index.has(nr)) {
            index.set(nr, { lat: c.lat, lon: c.lon, source: 'officiell markkarta', label: `Markplats ${nr}`, confidence: 'hög' });
          }
        }
      }
    }
  }
  return index;
}

async function loadOfficialMarkplatsIndex() {
  const layerUrls = await expandLayerUrls(await discoverLayerUrls());
  const allFeatures = [];
  for (const layerUrl of layerUrls) {
    try {
      const features = await queryLayerGeoJSON(layerUrl);
      allFeatures.push(...features);
    } catch (e) {
      console.warn('Kunde inte läsa lager', layerUrl, e);
    }
  }
  return indexOfficialMarkplatsFeatures(allFeatures);
}

// ---------------------------------------------------------------------------
// Adressgeokodning
// ---------------------------------------------------------------------------
async function geocodeAddress(place) {
  const q = geocodeQuery(place);
  const data = await fetchJson('https://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer/findAddressCandidates', {
    f: 'json',
    SingleLine: q,
    outFields: 'Match_addr,Addr_type,Score',
    maxLocations: '1',
    sourceCountry: 'SWE',
    location: `${VISBY_CENTER.lon},${VISBY_CENTER.lat}`,
    distance: '6000',
  });
  const cand = (data.candidates || [])[0];
  if (!cand || !cand.location) return null;
  const lat = cand.location.y;
  const lon = cand.location.x;
  const score = Number(cand.score || 0);
  if (score < 80 || !inVisby(lat, lon)) return null;
  return {
    lat,
    lon,
    source: 'adressgeokodad',
    label: cand.address || q,
    confidence: score >= 95 ? 'hög' : 'medel',
    score,
  };
}

function knownPlaceCoordinate(place) {
  for (const kp of KNOWN_PLACES) {
    if (kp.key.test(place)) {
      return { lat: kp.lat, lon: kp.lon, source: 'fast platsnamn', label: kp.label, confidence: 'medel' };
    }
  }
  return null;
}

async function resolveAllPlaces(forceRefresh = false) {
  const uniquePlaces = [...new Set(EVENTS.map(e => cleanPlace(e.p)).filter(Boolean))];
  const cache = forceRefresh ? {} : loadCache();
  const resolved = new Map();

  setStatus('Läser Region Gotlands officiella markkarta...', 4);
  let officialIndex = new Map();
  try {
    officialIndex = await loadOfficialMarkplatsIndex();
    setStatus(`Officiell markkarta läst: ${officialIndex.size} markplatsnycklar hittade.`, 10);
  } catch (e) {
    console.warn(e);
    setStatus('Kunde inte läsa officiell markkarta. Fortsätter med adressgeokodning.', 10);
  }

  let done = 0;
  for (const place of uniquePlaces) {
    const key = placeKey(place);
    done += 1;
    const pct = 10 + (done / uniquePlaces.length) * 88;

    if (!forceRefresh && cache[key]) {
      resolved.set(key, cache[key]);
      setStatus(`Laddar cache: ${done}/${uniquePlaces.length}`, pct);
      continue;
    }

    let coord = null;
    const nr = extractMarkplatsNumber(place);
    if (nr && officialIndex.has(nr)) {
      coord = officialIndex.get(nr);
      coord = { ...coord, match: `plats ${nr}` };
    }

    if (!coord && hasStreetAddress(place)) {
      setStatus(`Geokodar adress ${done}/${uniquePlaces.length}: ${place}`, pct);
      try {
        coord = await geocodeAddress(place);
      } catch (e) {
        console.warn('Geokodning misslyckades', place, e);
      }
      // Undvik att slå för hårt mot geokodningstjänsten.
      await sleep(90);
    }

    if (!coord) coord = knownPlaceCoordinate(place);

    if (coord && inVisby(coord.lat, coord.lon)) {
      cache[key] = coord;
      resolved.set(key, coord);
    } else {
      cache[key] = null;
      resolved.set(key, null);
    }

    if (done % 20 === 0) saveCache(cache);
  }
  saveCache(cache);

  for (const ev of EVENTS) {
    const coord = resolved.get(placeKey(ev.p));
    if (coord) {
      ev._lat = coord.lat;
      ev._lon = coord.lon;
      ev._coordSource = coord.source;
      ev._coordLabel = coord.label;
      ev._coordConfidence = coord.confidence;
      ev._coordScore = coord.score || null;
    } else {
      ev._lat = null;
      ev._lon = null;
      ev._coordSource = ev.p ? 'ej placerad' : 'plats saknas i programmet';
      ev._coordLabel = '';
      ev._coordConfidence = 'saknas';
    }
  }

  setStatus('Positionering klar. Ritar kartan...', 100);
  hideStatus();
}


// ---------------------------------------------------------------------------
// Karta, filter och visualisering
// ---------------------------------------------------------------------------
const DAY_LABELS = {
  '2026-06-22': 'Måndag 22/6',
  '2026-06-23': 'Tisdag 23/6',
  '2026-06-24': 'Onsdag 24/6',
  '2026-06-25': 'Torsdag 25/6',
  '2026-06-26': 'Fredag 26/6',
};

const map = L.map('map', { center: [57.6388, 18.2955], zoom: 15, preferCanvas: true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; <a href="https://carto.com/">CartoDB</a> &copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 20,
}).addTo(map);

const clusterGroup = L.markerClusterGroup({ maxClusterRadius: 38, showCoverageOnHover: false });
map.addLayer(clusterGroup);
let currentFiltered = [];
let allDates = [];
let allSubjects = [];

function sourceColor(source) {
  if (source === 'officiell markkarta') return '#22c55e';
  if (source === 'adressgeokodad') return '#3b82f6';
  if (source === 'fast platsnamn') return '#f59e0b';
  return '#ef4444';
}

function makeIcon(source) {
  const color = sourceColor(source);
  return L.divIcon({
    className: '',
    html: `<div style="width:13px;height:13px;border-radius:50%;background:${color};border:2px solid rgba(15,23,42,.75);box-shadow:0 0 7px rgba(15,23,42,.35);"></div>`,
    iconSize: [13, 13],
    iconAnchor: [6, 6],
  });
}

function eventHtml(ev) {
  const time = `${esc(ev.g || '')} ${esc(ev.s || '')}${ev.e ? '–' + esc(ev.e) : ''}`;
  return `<div class="event-item">
    <div class="event-title">${esc(ev.t || '(utan titel)')}</div>
    <div class="event-meta">📅 ${time} · ${esc(ev.d || '')}</div>
    ${ev.a ? `<div class="event-meta">🏛 ${esc(ev.a)}</div>` : ''}
    ${ev.am ? `<span class="tag">${esc(ev.am)}</span>` : ''}
  </div>`;
}

function popupHtml(place, coord, events) {
  const cls = coord.source === 'officiell markkarta' ? 'source-official' : coord.source === 'adressgeokodad' ? 'source-address' : 'source-manual';
  const shown = events.slice(0, 40).map(eventHtml).join('');
  const rest = events.length > 40 ? `<div class="event-meta">+ ${events.length - 40} fler evenemang på samma plats.</div>` : '';
  return `<div>
    <div class="popup-place">📍 ${esc(place || 'Plats')}</div>
    <div class="popup-source ${cls}">Position: ${esc(coord.source)}${coord.label ? ' · ' + esc(coord.label) : ''}${coord.score ? ' · score ' + Math.round(coord.score) : ''}</div>
    <div class="event-meta">${events.length} evenemang på denna punkt</div>
    <div class="event-list">${shown}${rest}</div>
  </div>`;
}

function groupByPlace(events) {
  const mapByPlace = new Map();
  for (const ev of events) {
    if (!Number.isFinite(ev._lat) || !Number.isFinite(ev._lon)) continue;
    const key = `${placeKey(ev.p)}|${ev._lat.toFixed(6)}|${ev._lon.toFixed(6)}`;
    if (!mapByPlace.has(key)) {
      mapByPlace.set(key, { place: cleanPlace(ev.p), lat: ev._lat, lon: ev._lon, coord: { source: ev._coordSource, label: ev._coordLabel, score: ev._coordScore }, events: [] });
    }
    mapByPlace.get(key).events.push(ev);
  }
  return [...mapByPlace.values()];
}

function renderMarkers(events) {
  clusterGroup.clearLayers();
  const placedEvents = events.filter(e => Number.isFinite(e._lat) && Number.isFinite(e._lon));
  const groups = groupByPlace(events);
  const markers = groups.map(g => {
    const marker = L.marker([g.lat, g.lon], { icon: makeIcon(g.coord.source) });
    marker.bindPopup(popupHtml(g.place, g.coord, g.events), { maxWidth: 420 });
    return marker;
  });
  clusterGroup.addLayers(markers);

  const unplaced = events.length - placedEvents.length;
  document.getElementById('stat-showing').textContent = events.length;
  document.getElementById('stat-placed').textContent = placedEvents.length;
  document.getElementById('stat-unplaced').textContent = unplaced;
  document.getElementById('stat-points').textContent = groups.length;
  document.getElementById('event-count').textContent = `${events.length} evenemang`;
}

function selectedValues(selector) {
  return [...document.querySelectorAll(selector)]
    .filter(cb => cb.checked)
    .map(cb => cb.value);
}

function applyFilters() {
  const selectedDates = selectedValues('.date-check');
  const selectedSubjects = selectedValues('.subject-check');
  const search = document.getElementById('filter-search').value.toLowerCase().trim();

  currentFiltered = EVENTS.filter(ev => {
    if (selectedDates.length === 0 || !selectedDates.includes(ev.d)) return false;
    if (selectedSubjects.length === 0 || !selectedSubjects.includes(ev.am || 'Övrigt')) return false;
    if (search) {
      const haystack = `${ev.t || ''} ${ev.a || ''} ${ev.p || ''} ${ev.am || ''}`.toLowerCase();
      if (!haystack.includes(search)) return false;
    }
    return true;
  });
  renderMarkers(currentFiltered);
}

function checkboxRow(value, label, className) {
  const safeValue = esc(value);
  const safeLabel = esc(label);
  return `<label class="check-row"><input type="checkbox" class="${className}" value="${safeValue}" checked><span>${safeLabel}</span></label>`;
}

function populateFilters() {
  allDates = [...new Set(EVENTS.map(e => e.d).filter(Boolean))].sort();
  allSubjects = [...new Set(EVENTS.map(e => e.am || 'Övrigt'))].sort((a,b) => a.localeCompare(b, 'sv'));

  document.getElementById('date-options').innerHTML = allDates
    .map(d => checkboxRow(d, DAY_LABELS[d] || d, 'date-check'))
    .join('');

  document.getElementById('subject-options').innerHTML = allSubjects
    .map(s => checkboxRow(s, s, 'subject-check'))
    .join('');
}

function setCheckboxes(selector, checked) {
  document.querySelectorAll(selector).forEach(cb => { cb.checked = checked; });
  applyFilters();
}

function toggleFilters(open = null) {
  const panel = document.getElementById('filter-panel');
  const toggle = document.getElementById('filter-toggle');
  const shouldOpen = open === null ? panel.classList.contains('collapsed') : open;
  panel.classList.toggle('collapsed', !shouldOpen);
  panel.setAttribute('aria-hidden', shouldOpen ? 'false' : 'true');
  toggle.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
  toggle.textContent = shouldOpen ? '− Filter' : '+ Filter';
}

document.getElementById('filter-toggle').addEventListener('click', () => toggleFilters());
document.getElementById('filter-close').addEventListener('click', () => toggleFilters(false));
document.getElementById('filter-search').addEventListener('input', applyFilters);
document.getElementById('date-options').addEventListener('change', applyFilters);
document.getElementById('subject-options').addEventListener('change', applyFilters);
document.querySelectorAll('[data-select]').forEach(btn => {
  btn.addEventListener('click', () => {
    const action = btn.getAttribute('data-select');
    if (action === 'dates-all') setCheckboxes('.date-check', true);
    if (action === 'dates-none') setCheckboxes('.date-check', false);
    if (action === 'subjects-all') setCheckboxes('.subject-check', true);
    if (action === 'subjects-none') setCheckboxes('.subject-check', false);
  });
});

document.getElementById('refresh-coords').addEventListener('click', async () => {
  document.getElementById('status-panel').style.display = 'block';
  document.getElementById('refresh-coords').disabled = true;
  await resolveAllPlaces(true);
  applyFilters();
  document.getElementById('refresh-coords').disabled = false;
});

(async function init() {
  populateFilters();
  document.getElementById('event-count').textContent = `${EVENTS.length} evenemang`;
  document.getElementById('refresh-coords').disabled = true;
  await resolveAllPlaces(false);
  applyFilters();
  document.getElementById('refresh-coords').disabled = false;
})();
</script>
